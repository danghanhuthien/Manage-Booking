<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking System — Đăng nhập</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #181c25;
      --surface2: #1e2330;
      --border: rgba(255,255,255,0.07);
      --border-focus: rgba(99,179,237,0.5);
      --text: #e8eaf0;
      --text-muted: #6b7280;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.15);
      --accent-hover: #2563eb;
      --error: #f87171;
      --success: #34d399;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo / brand */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 0 24px rgba(59,130,246,0.3);
    }

    .brand-icon svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .brand p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 300;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.3);
    }

    /* Form */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: var(--text-muted);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      pointer-events: none;
      transition: stroke 0.2s;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px 11px 38px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder { color: var(--text-muted); }

    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: #1c2130;
    }

    input:focus + svg,
    .input-wrap:focus-within svg {
      stroke: var(--accent);
    }

    /* toggle password */
    .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: var(--text-muted);
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: var(--text); }
    .toggle-pass svg {
      position: static;
      transform: none;
      width: 16px; height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Error */
    .error-msg {
      display: none;
      align-items: center;
      gap: 7px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 16px;
      animation: shake 0.3s ease;
    }

    .error-msg.show { display: flex; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .error-msg svg {
      width: 15px; height: 15px;
      stroke: var(--error);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* Button */
    .btn-login {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
      letter-spacing: 0.2px;
    }

    .btn-login:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 4px 16px rgba(59,130,246,0.3);
    }

    .btn-login:active:not(:disabled) { transform: scale(0.99); }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="2"/>
        <path d="M9 12h6M9 16h4"/>
      </svg>
    </div>
    <h1>Booking System</h1>
    <p>Hệ thống quản lý booking tour</p>
  </div>

  <div class="card">
    <div class="error-msg" id="error-msg">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-text">Sai tài khoản hoặc mật khẩu</span>
    </div>

    <div class="field">
      <label>Tài khoản</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="Nhập tên đăng nhập" autocomplete="username" />
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div>

    <div class="field">
      <label>Mật khẩu</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Nhập mật khẩu" autocomplete="current-password" />
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <button class="toggle-pass" type="button" onclick="togglePass()" tabindex="-1" title="Hiện/ẩn mật khẩu">
          <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="login-btn" onclick="handleLogin()">
      <div class="spinner"></div>
      <span class="btn-text">Đăng nhập</span>
    </button>
  </div>

  <div class="footer">v1.0 · Booking Tour System</div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwgSBotRhoWOkIQ2r-FlVywi4P2bNeus6aQ2tqGy_m2PcNcUN1i3DrxdNjVZSAkXeGH/exec";

  // Enter để login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  function togglePass() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      input.type = 'password';
      icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    el.classList.remove('show');
    void el.offsetWidth; // re-trigger animation
    el.classList.add('show');
  }

  function setLoading(on) {
    const btn = document.getElementById('login-btn');
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }

  async function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username || !password) {
      showError('Vui lòng nhập đầy đủ tài khoản và mật khẩu');
      return;
    }

    setLoading(true);
    document.getElementById('error-msg').classList.remove('show');

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'login', username, password })
      });

      const data = await res.json();

      if (data.success) {
        // Lưu session
        localStorage.setItem('user', JSON.stringify({
          displayName: data.displayName,
          role: data.role,
          username
        }));
        // TODO: chuyển sang trang chính
        window.location.href = 'main.html';
      } else {
        showError(data.msg || 'Đăng nhập thất bại');
        setLoading(false);
      }
    } catch (err) {
      showError('Không kết nối được server, thử lại sau');
      setLoading(false);
    }
  }

  // Nếu đã login rồi thì redirect luôn
  if (localStorage.getItem('user')) {
    window.location.href = 'main.html';
  }
</script>
</body>
</html>
