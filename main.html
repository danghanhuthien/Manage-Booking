<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #181c25; --surface2: #1e2330; --surface3: #232838;
      --border: rgba(255,255,255,0.07); --border-focus: rgba(99,179,237,0.45);
      --text: #e8eaf0; --text-muted: #6b7280; --text-dim: #9ca3af;
      --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.12); --accent-hover: #2563eb;
      --danger: #ef4444; --danger-soft: rgba(239,68,68,0.08);
      --success: #10b981; --success-soft: rgba(16,185,129,0.08);
      --warning: #f59e0b; --warning-soft: rgba(245,158,11,0.08);
    }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    /* NAVBAR */
    .navbar { height:54px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:12px; flex-shrink:0; }
    .nav-brand { display:flex; align-items:center; gap:9px; font-weight:600; font-size:14px; white-space:nowrap; }
    .nav-brand-icon { width:28px; height:28px; background:linear-gradient(135deg,#3b82f6,#1d4ed8); border-radius:7px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 10px rgba(59,130,246,0.3); flex-shrink:0; }
    .nav-brand-icon svg { width:14px; height:14px; stroke:white; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .nav-sep { width:1px; height:18px; background:var(--border); flex-shrink:0; }
    .month-tabs { display:flex; gap:4px; flex:1; overflow-x:auto; min-width:0; }
    .month-tabs::-webkit-scrollbar { display:none; }
    .tab-btn { padding:4px 13px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; white-space:nowrap; transition:all 0.15s; }
    .tab-btn:hover { background:var(--surface2); color:var(--text); }
    .tab-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
    .nav-right { display:flex; align-items:center; gap:8px; margin-left:auto; flex-shrink:0; }
    .user-chip { display:flex; align-items:center; gap:7px; background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:4px 9px; }
    .user-chip span { font-size:12px; font-weight:500; }
    .role-badge { font-size:10px; font-weight:600; padding:2px 6px; border-radius:4px; text-transform:uppercase; letter-spacing:0.4px; font-family:'DM Mono',monospace; }
    .role-Admin { background:rgba(59,130,246,0.15); color:#60a5fa; }
    .role-Sale  { background:rgba(16,185,129,0.15); color:#34d399; }
    .role-OP    { background:rgba(245,158,11,0.15);  color:#fbbf24; }
    .role-Xe    { background:rgba(139,92,246,0.15);  color:#a78bfa; }
    .btn-icon { width:30px; height:30px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
    .btn-icon:hover { background:var(--surface2); color:var(--text); }
    .btn-icon svg { width:14px; height:14px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }

    /* TOOLBAR */
    .toolbar { height:50px; display:flex; align-items:center; gap:8px; padding:0 16px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
    .search-wrap { position:relative; }
    .search-wrap svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); width:13px; height:13px; stroke:var(--text-muted); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; pointer-events:none; }
    .search-input { width:240px; background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:6px 9px 6px 29px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:12px; outline:none; transition:border-color 0.15s,box-shadow 0.15s; }
    .search-input::placeholder { color:var(--text-muted); }
    .search-input:focus { border-color:var(--border-focus); box-shadow:0 0 0 3px var(--accent-glow); }
    .row-count { font-size:11px; color:var(--text-muted); font-family:'DM Mono',monospace; }
    .spacer { flex:1; }
    .btn-add { display:flex; align-items:center; gap:5px; padding:6px 13px; background:var(--accent); color:white; border:none; border-radius:7px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; white-space:nowrap; transition:background 0.15s,box-shadow 0.15s; }
    .btn-add:hover { background:var(--accent-hover); box-shadow:0 2px 10px rgba(59,130,246,0.3); }
    .btn-add svg { width:13px; height:13px; stroke:white; stroke-width:2.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }

    /* TABLE */
    .table-wrap { flex:1; overflow:auto; position:relative; }
    table { border-collapse:separate; border-spacing:0; font-size:11.5px; width:100%; }
    th { position:sticky; top:0; z-index:10; background:var(--surface2); color:var(--text-muted); font-size:10.5px; font-weight:500; text-transform:uppercase; letter-spacing:0.4px; padding:8px 10px; border-bottom:1px solid var(--border); white-space:nowrap; }
    th:first-child { width:36px; text-align:center; }
    tbody tr { cursor:pointer; transition:background 0.1s; }
    tbody tr:hover td { background:var(--surface2); }
    td { padding:7px 10px; border-bottom:1px solid var(--border); white-space:nowrap; color:var(--text); }
    td:first-child { text-align:center; color:var(--accent); }
    .badge-status { display:inline-block; padding:2px 7px; border-radius:4px; font-size:10px; font-weight:600; font-family:'DM Mono',monospace; }
    .badge-done    { background:var(--success-soft); color:var(--success); }
    .badge-pending { background:var(--warning-soft); color:var(--warning); }
    .cell-check { color:var(--success); }
    .empty-state { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--text-muted); font-size:13px; }
    .empty-state.show { display:flex; }
    .empty-state svg { width:32px; height:32px; stroke:var(--surface3); stroke-width:1.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .loading-wrap { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(15,17,23,0.6); z-index:20; }
    .loading-wrap.hidden { display:none; }
    .spin { width:26px; height:26px; border:2px solid var(--surface3); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* DRAWER */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(2px); z-index:200; display:none; }
    .overlay.show { display:block; }
    .drawer { position:fixed; top:0; right:-500px; width:460px; height:100%; background:var(--surface); border-left:1px solid var(--border); box-shadow:-8px 0 32px rgba(0,0,0,0.4); z-index:201; display:flex; flex-direction:column; transition:right 0.3s cubic-bezier(0.4,0,0.2,1); }
    .drawer.open { right:0; }
    .drawer-head { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .drawer-head h6 { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); }
    .drawer-body { flex:1; overflow-y:auto; padding:16px 18px; }
    .drawer-body::-webkit-scrollbar { width:3px; }
    .drawer-body::-webkit-scrollbar-track { background:transparent; }
    .drawer-body::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:2px; }
    .drawer-foot { padding:12px 18px; border-top:1px solid var(--border); display:flex; gap:8px; flex-shrink:0; }

    /* FORM */
    .form-section { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--accent); padding:14px 0 8px; border-bottom:1px solid var(--border); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
    .form-section:first-of-type { padding-top:4px; }
    .form-section svg { width:12px; height:12px; stroke:var(--accent); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .form-grid  { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
    .form-grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:10px; }
    .span2 { grid-column:span 2; }
    .field { display:flex; flex-direction:column; gap:4px; }
    .field label { font-size:10px; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.4px; }
    .field input[type=text],
    .field input[type=number],
    .field input[type=date],
    .field textarea {
      background:var(--surface2); border:1px solid var(--border); border-radius:7px;
      padding:7px 10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:12px;
      outline:none; transition:border-color 0.15s,box-shadow 0.15s; width:100%;
    }
    .field input:focus, .field textarea:focus { border-color:var(--border-focus); box-shadow:0 0 0 3px var(--accent-glow); }
    .field input[type=date]::-webkit-calendar-picker-indicator { filter:invert(0.4); cursor:pointer; }
    .field textarea { resize:none; min-height:64px; line-height:1.5; }
    .check-row { display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:7px 10px; cursor:pointer; transition:border-color 0.15s; }
    .check-row:hover { border-color:var(--border-focus); }
    .check-row input[type=checkbox] { width:14px; height:14px; accent-color:var(--accent); cursor:pointer; flex-shrink:0; }
    .check-row span { font-size:12px; color:var(--text-dim); }

    /* readonly info block */
    .info-block { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:4px; }
    .info-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .info-grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .info-item label { display:block; font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:2px; }
    .info-item span  { font-size:12px; color:var(--text); font-family:'DM Mono',monospace; }
    .info-item span.muted { color:var(--text-muted); }

    /* BUTTONS */
    .btn-save { flex:1; padding:9px; background:var(--accent); color:white; border:none; border-radius:7px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:background 0.15s; display:flex; align-items:center; justify-content:center; gap:6px; }
    .btn-save:hover:not(:disabled) { background:var(--accent-hover); }
    .btn-save:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-save svg { width:14px; height:14px; stroke:white; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .btn-del { padding:9px 14px; background:var(--danger-soft); color:var(--danger); border:1px solid rgba(239,68,68,0.15); border-radius:7px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:background 0.15s; }
    .btn-del:hover { background:rgba(239,68,68,0.15); }
    .hidden { display:none !important; }

    /* TOAST */
    .toast { position:fixed; bottom:20px; right:20px; background:var(--surface2); border:1px solid var(--border); border-radius:9px; padding:11px 14px; font-size:13px; box-shadow:0 8px 24px rgba(0,0,0,0.3); z-index:999; display:flex; align-items:center; gap:8px; transform:translateY(70px); opacity:0; transition:transform 0.25s ease,opacity 0.25s ease; max-width:300px; pointer-events:none; }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.success { border-color:rgba(16,185,129,0.25); }
    .toast.error   { border-color:rgba(239,68,68,0.25); }
    .toast svg { width:15px; height:15px; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
    .toast.success svg { stroke:var(--success); }
    .toast.error   svg { stroke:var(--danger); }

    /* CONFIRM */
    .confirm-bg { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:300; display:none; align-items:center; justify-content:center; }
    .confirm-bg.show { display:flex; }
    .confirm-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:22px; width:300px; box-shadow:0 24px 48px rgba(0,0,0,0.4); }
    .confirm-box h6 { font-size:14px; font-weight:600; margin-bottom:7px; }
    .confirm-box p  { font-size:12px; color:var(--text-muted); margin-bottom:18px; line-height:1.5; }
    .confirm-acts { display:flex; gap:8px; }
    .confirm-acts button { flex:1; padding:8px; border-radius:7px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; border:none; }
    .btn-cc { background:var(--surface2); color:var(--text); border:1px solid var(--border) !important; }
    .btn-co { background:var(--danger); color:white; }

    @media (max-width:640px) { .drawer { width:100%; right:-100%; } .search-input { width:160px; } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-brand-icon">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12h6M9 16h4"/></svg>
    </div>
    <span>Booking System</span>
  </div>
  <div class="nav-sep"></div>
  <div class="month-tabs" id="month-tabs">
    <span style="font-size:11px;color:var(--text-muted);align-self:center">Đang tải...</span>
  </div>
  <div class="nav-right">
    <div class="user-chip">
      <span id="u-name"></span>
      <span class="role-badge" id="u-role"></span>
    </div>
    <button class="btn-icon" onclick="handleLogout()" title="Đăng xuất">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</nav>

<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" id="search-input" placeholder="Tìm kiếm..." oninput="filterTable()">
  </div>
  <span class="row-count" id="row-count"></span>
  <div class="spacer"></div>
  <button class="btn-add" id="btn-add" onclick="openNew()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Thêm mới
  </button>
</div>

<div class="table-wrap" id="table-wrap">
  <div class="loading-wrap" id="loading"><div class="spin"></div></div>
  <div class="empty-state" id="empty-state">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span>Chưa có booking nào</span>
  </div>
  <table>
    <thead><tr id="t-head"></tr></thead>
    <tbody id="t-body"></tbody>
  </table>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h6 id="drawer-title">Booking</h6>
    <button class="btn-icon" onclick="closeDrawer()">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-foot">
    <button class="btn-save" id="btn-save" onclick="submitForm()">
      <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Lưu dữ liệu
    </button>
    <button class="btn-del hidden" id="btn-del" onclick="confirmDelete()">Xoá</button>
  </div>
</div>

<div class="confirm-bg" id="confirm-bg">
  <div class="confirm-box">
    <h6>Xác nhận xoá</h6>
    <p>Booking này sẽ bị xoá vĩnh viễn và không thể khôi phục.</p>
    <div class="confirm-acts">
      <button class="btn-cc" onclick="closeConfirm()">Huỷ bỏ</button>
      <button class="btn-co" onclick="doDelete()">Xoá ngay</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <svg id="toast-icon" viewBox="0 0 24 24"></svg>
  <span id="toast-msg"></span>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwgSBotRhoWOkIQ2r-FlVywi4P2bNeus6aQ2tqGy_m2PcNcUN1i3DrxdNjVZSAkXeGH/exec";

let USER=null, CUR_SHEET=null, HEADERS=[], ALL_ROWS=[], FILTERED=[], EDIT_ID=null;

// ── PHÂN QUYỀN ────────────────────────────────
// null = Admin không giới hạn
const PERMISSIONS = {
  "Sale":  ["BOOKING CODE","Ngày đến","Số đêm","PAX","Ngủ BKK trước",
            "TWN","DBL","SGL","TRP","GUIDE ROOM","ARR No.","Time","NOTE","File"],
  "OP":    ["Final","PTTY Hotel","BKK Hotel"],
  "Xe":    ["Bus","Seat","TT Tài xế"],
  "Admin": null
};

// Cột tự động — KHÔNG đưa vào form nhập
// No. tự sinh bởi sheet, SALE tự lấy từ login
// Các cột công thức + lịch phòng hiện readonly ở cuối
const SKIP_INPUT = ["No.","SALE"];

const AUTO_READONLY = [
  "Trạng thái","Nhắc nhở","Ngày đi",
  "Nội dung booking ks PTTY","Nội dung booking khách sạn BKK"
];

const ROOM_COLS = [
  "Ngày check in PTD","Ngày check out PTD","Số ngày PTD",
  "Ngày check in 1","Ngày check out BKK","Số ngày 1",
  "Ngày check in BKK 2","Ngày check out 2","Số ngày 2"
];

const CHECKBOX_COLS = ["Ngủ BKK trước","Final"];
const NUMBER_COLS   = ["Số đêm","PAX","TWN","DBL","SGL","TRP","GUIDE ROOM"];
const DATE_COLS     = ["Ngày đến"];

// ── SECTIONS form (tất cả field nhập liệu) ────
const SECTIONS = [
  {
    title:"Thông tin chuyến",
    icon:`<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`,
    layout:"grid2",
    fields:["BOOKING CODE","Ngày đến","Số đêm","PAX","Ngủ BKK trước","GUIDE","ARR No.","Time"]
  },
  {
    title:"Loại phòng",
    icon:`<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
    layout:"grid3",
    fields:["TWN","DBL","SGL","TRP","GUIDE ROOM"]
  },
  {
    title:"Khách sạn & OP",
    icon:`<svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>`,
    layout:"grid2",
    fields:["PTTY Hotel","BKK Hotel","Final"]
  },
  {
    title:"Vận chuyển",
    icon:`<svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`,
    layout:"grid3",
    fields:["Bus","Seat","TT Tài xế"]
  },
  {
    title:"Ghi chú & File",
    icon:`<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
    layout:"grid2",
    fields:["NOTE","File"]
  }
];

// ── INIT ───────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('user');
  if (!saved) { location.href='index.html'; return; }
  USER = JSON.parse(saved);
  document.getElementById('u-name').textContent = USER.displayName;
  const rb = document.getElementById('u-role');
  rb.textContent = USER.role;
  rb.className = `role-badge role-${USER.role}`;
  if (USER.role!=='Admin' && USER.role!=='Sale') document.getElementById('btn-add').style.display='none';
  loadTabs();
});

function handleLogout() { localStorage.removeItem('user'); location.href='index.html'; }

async function api(payload) {
  const res = await fetch(API_URL, { method:'POST', body:JSON.stringify(payload) });
  return res.json();
}

// ── TABS ───────────────────────────────────────
async function loadTabs() {
  try {
    const data = await api({ action:'getMonthSheets' });
    const wrap = document.getElementById('month-tabs');
    if (!data.success || !data.sheets.length) {
      wrap.innerHTML = '<span style="font-size:11px;color:var(--text-muted);align-self:center">Chưa có sheet</span>';
      setLoading(false); return;
    }
    wrap.innerHTML = data.sheets.map((s,i) =>
      `<button class="tab-btn ${i===0?'active':''}" data-sheet="${s}" onclick="selectTab('${s}',this)">${s.replace('Data ','')}</button>`
    ).join('');
    selectTab(data.sheets[0], wrap.querySelector('.tab-btn'));
  } catch(e) { showToast('Không tải được tabs','error'); setLoading(false); }
}

function selectTab(sheetName, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  CUR_SHEET = sheetName;
  loadData();
}

// ── LOAD DATA ──────────────────────────────────
async function loadData() {
  setLoading(true);
  document.getElementById('t-head').innerHTML='';
  document.getElementById('t-body').innerHTML='';
  document.getElementById('row-count').textContent='';
  document.getElementById('empty-state').classList.remove('show');
  try {
    const data = await api({ action:'getBookingData', userInfo:USER, sheetName:CUR_SHEET });
    if (!data.success) { showToast(data.msg,'error'); return; }
    HEADERS=data.headers; ALL_ROWS=data.rows; FILTERED=[...ALL_ROWS];
    document.getElementById('search-input').value='';
    renderTable();
  } catch(e) { showToast('Lỗi tải dữ liệu','error'); }
  finally { setLoading(false); }
}

// ── RENDER TABLE ───────────────────────────────
function renderTable() {
  document.getElementById('t-head').innerHTML =
    '<th>✎</th>' + HEADERS.map(h=>`<th>${h}</th>`).join('');
  document.getElementById('t-body').innerHTML = FILTERED.map((row,idx) =>
    `<tr onclick="openEdit(${idx})"><td>✎</td>${row.map((cell,ci)=>{
      const col=(HEADERS[ci]||'').toString().trim();
      if (typeof cell==='boolean') return `<td class="${cell?'cell-check':''}">${cell?'✓':''}</td>`;
      if (col==='Trạng thái') {
        const cls=cell==='DONE'?'badge-done':cell?'badge-pending':'';
        return `<td>${cell?`<span class="badge-status ${cls}">${cell}</span>`:''}</td>`;
      }
      return `<td>${cell??''}</td>`;
    }).join('')}</tr>`
  ).join('');
  const total=ALL_ROWS.length, shown=FILTERED.length;
  document.getElementById('row-count').textContent = shown===total?`${total} booking`:`${shown}/${total} booking`;
  document.getElementById('empty-state').classList.toggle('show',!FILTERED.length);
}

function filterTable() {
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  FILTERED=q?ALL_ROWS.filter(r=>r.some(c=>(c??'').toString().toLowerCase().includes(q))):[...ALL_ROWS];
  renderTable();
}

// ── OPEN DRAWER ────────────────────────────────
function openNew() {
  EDIT_ID=null;
  document.getElementById('drawer-title').textContent='THÊM MỚI BOOKING';
  document.getElementById('btn-del').classList.add('hidden');
  buildForm(null);
  openDrawer();
}

function openEdit(idx) {
  const row=FILTERED[idx];
  const noIdx=HEADERS.findIndex(h=>h.toString().trim()==='No.');
  EDIT_ID=noIdx!==-1?row[noIdx]:null;
  document.getElementById('drawer-title').textContent='CHỈNH SỬA BOOKING';
  document.getElementById('btn-del').classList.toggle('hidden', USER.role!=='Admin');
  buildForm(row);
  openDrawer();
}

// ── BUILD FORM ─────────────────────────────────
function buildForm(row) {
  const allowed = PERMISSIONS[USER.role]; // null = Admin
  const gv = (col) => {
    const i=HEADERS.findIndex(h=>h.toString().trim()===col);
    return (i!==-1&&row)?( row[i]??'' ):'';
  };

  let html='';

  // ── Block thông tin hệ thống (readonly) ──
  html += `<div class="form-section">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h6M9 17h4"/></svg>
    Thông tin hệ thống
  </div>
  <div class="info-block">
    <div class="info-grid2">
      <div class="info-item">
        <label>No. (tự sinh)</label>
        <span class="${gv('No.')?'':'muted'}">${gv('No.')||'(tự động)'}</span>
      </div>
      <div class="info-item">
        <label>Sale</label>
        <span class="${gv('SALE')?'':'muted'}">${row?gv('SALE'):USER.displayName}</span>
      </div>
      <div class="info-item">
        <label>Trạng thái</label>
        <span class="${gv('Trạng thái')?'':'muted'}">${gv('Trạng thái')||'—'}</span>
      </div>
      <div class="info-item">
        <label>Nhắc nhở</label>
        <span class="${gv('Nhắc nhở')?'':'muted'}">${gv('Nhắc nhở')||'—'}</span>
      </div>
      <div class="info-item">
        <label>Ngày đi</label>
        <span class="${gv('Ngày đi')?'':'muted'}">${gv('Ngày đi')||'—'}</span>
      </div>
    </div>
  </div>`;

  // ── Render các section nhập liệu ──
  SECTIONS.forEach(sec => {
    const visible = sec.fields.filter(col => !allowed || allowed.includes(col));
    if (!visible.length) return;

    html += `<div class="form-section">${sec.icon} ${sec.title}</div>`;

    if (sec.layout==='grid3') {
      html += `<div class="form-grid3">`;
      visible.forEach(col => { html += buildField(col, gv(col)); });
      html += `</div>`;
    } else {
      // grid2 — một số field full width
      html += `<div class="form-grid">`;
      visible.forEach(col => {
        const full = ['BOOKING CODE','Ngủ BKK trước','NOTE'].includes(col);
        html += `<div class="${full?'span2':''}">` + buildField(col, gv(col)) + `</div>`;
      });
      html += `</div>`;
    }
  });

  // ── Nội dung booking (readonly, chỉ khi sửa) ──
  if (row) {
    const nd1 = gv('Nội dung booking ks PTTY');
    const nd2 = gv('Nội dung booking khách sạn BKK');
    if (nd1||nd2) {
      html += `<div class="form-section">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Nội dung booking (tự sinh)
      </div>
      <div class="info-block" style="display:flex;flex-direction:column;gap:10px;">
        ${nd1?`<div class="info-item"><label>Nội dung PTTY</label><span style="white-space:pre-wrap;font-family:'DM Sans',sans-serif;font-size:12px;">${nd1}</span></div>`:''}
        ${nd2?`<div class="info-item"><label>Nội dung BKK</label><span style="white-space:pre-wrap;font-family:'DM Sans',sans-serif;font-size:12px;">${nd2}</span></div>`:''}
      </div>`;
    }
  }

  // ── Lịch phòng (readonly, chỉ khi sửa và có dữ liệu) ──
  if (row) {
    const hasRoom = ROOM_COLS.some(c => {
      const i=HEADERS.findIndex(h=>h.toString().trim()===c);
      return i!==-1&&row[i];
    });
    if (hasRoom) {
      html += `<div class="form-section">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Lịch phòng (tự tính)
      </div>
      <div class="info-block"><div class="info-grid3">`;
      ROOM_COLS.forEach(col => {
        const i=HEADERS.findIndex(h=>h.toString().trim()===col);
        const v=i!==-1?(row[i]??')':'';
        html += `<div class="info-item"><label>${col}</label><span class="${v?'':'muted'}">${v||'—'}</span></div>`;
      });
      html += `</div></div>`;
    }
  }

  document.getElementById('drawer-body').innerHTML = html;
}

// ── BUILD SINGLE FIELD ─────────────────────────
function buildField(col, val) {
  const id = `f_${col.replace(/[^a-zA-Z0-9]/g,'_')}`;

  if (CHECKBOX_COLS.includes(col)) {
    const checked=(val===true||val==='true'||val==='✓')?'checked':'';
    return `<div class="field"><label>${col}</label>
      <label class="check-row">
        <input type="checkbox" id="${id}" ${checked}>
        <span>${col}</span>
      </label></div>`;
  }

  if (DATE_COLS.includes(col)) {
    let dv='';
    if (val&&typeof val==='string'&&val.includes('/')) {
      const [d,m,y]=val.split('/');
      dv=`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    return `<div class="field"><label>${col}</label>
      <input type="date" id="${id}" value="${dv}"></div>`;
  }

  if (NUMBER_COLS.includes(col)) {
    return `<div class="field"><label>${col}</label>
      <input type="number" id="${id}" value="${val}" min="0" placeholder="0"></div>`;
  }

  if (col==='NOTE') {
    return `<div class="field"><label>${col}</label>
      <textarea id="${id}" placeholder="Ghi chú...">${val}</textarea></div>`;
  }

  return `<div class="field"><label>${col}</label>
    <input type="text" id="${id}" value="${val}" placeholder="${col}"></div>`;
}

// ── SUBMIT ─────────────────────────────────────
async function submitForm() {
  const btn=document.getElementById('btn-save');
  btn.disabled=true;
  btn.innerHTML=`<div class="spin" style="width:14px;height:14px;border-width:2px;margin:0"></div>&nbsp;Đang lưu...`;

  const allowed=PERMISSIONS[USER.role];
  const allFields=SECTIONS.flatMap(s=>s.fields);
  const updateData={};

  allFields.forEach(col => {
    if (allowed&&!allowed.includes(col)) return;
    const id=`f_${col.replace(/[^a-zA-Z0-9]/g,'_')}`;
    const el=document.getElementById(id);
    if (!el) return;
    let val;
    if (el.type==='checkbox') { val=el.checked; }
    else if (el.type==='date') { val=el.value?( ()=>{ const [y,m,d]=el.value.split('-'); return `${d}/${m}/${y}`; })():''; }
    else if (el.type==='number') { val=el.value!==''?Number(el.value):''; }
    else { val=el.tagName==='TEXTAREA'?el.value:el.value; }
    updateData[col]=val;
  });

  try {
    const res=await api({ action:'saveBooking', userInfo:USER, sheetName:CUR_SHEET, updateData, rowId:EDIT_ID });
    showToast(res.msg, res.success?'success':'error');
    if (res.success) {
      closeDrawer();
      if (res.sheetName&&res.sheetName!==CUR_SHEET) {
        await loadTabs();
        const newTab=document.querySelector(`[data-sheet="${res.sheetName}"]`);
        if (newTab) selectTab(res.sheetName, newTab);
      } else { await loadData(); }
    }
  } catch(e) { showToast('Lỗi kết nối: '+e.message,'error'); }
  finally {
    btn.disabled=false;
    btn.innerHTML=`<svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Lưu dữ liệu`;
  }
}

// ── DELETE ─────────────────────────────────────
function confirmDelete() { document.getElementById('confirm-bg').classList.add('show'); }
function closeConfirm()  { document.getElementById('confirm-bg').classList.remove('show'); }
async function doDelete() {
  closeConfirm();
  try {
    const res=await api({ action:'deleteBooking', userInfo:USER, sheetName:CUR_SHEET, rowId:EDIT_ID });
    showToast(res.msg, res.success?'success':'error');
    if (res.success) { closeDrawer(); await loadData(); }
  } catch(e) { showToast('Lỗi kết nối','error'); }
}

// ── HELPERS ────────────────────────────────────
function openDrawer()  { document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
function setLoading(on){ document.getElementById('loading').classList.toggle('hidden',!on); }

let _tt;
function showToast(msg, type='success') {
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  document.getElementById('toast-icon').innerHTML=type==='success'
    ?'<polyline points="20 6 9 17 4 12"/>'
    :'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
  t.className=`toast ${type} show`;
  clearTimeout(_tt);
  _tt=setTimeout(()=>t.classList.remove('show'),3200);
}
</script>
